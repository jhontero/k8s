name: CI/CD Pipeline

on:
  push:
    branches:
      - main          # dispara al hacer commit en main

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k8s:latest
            ${{ secrets.DOCKER_USERNAME }}/k8s:${{ github.sha }}

  update-helm:
    name: Actualizar tag en Helm values
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Actualizar image tag en values.yaml
        run: |
          sed -i 's/tag: .*/tag: "'${{ github.sha }}'"/g' helm/k8s/values.yaml

      - name: Commit y push del cambio
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/k8s/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push